# Reverse proxy GANNDAL — frontend (Next.js) + API (Express)
server {
    listen 80;
    server_name ganndal.media www.ganndal.media;
    # Redirection HTTPS (décommenter après obtention du certificat)
    # return 301 https://$host$request_uri;

    client_max_body_size 2048M; # uploads vidéo

    location /api/ {
        proxy_pass http://backend:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers publics MinIO (uploads) : /files/ganndal/<clé> -> minio
    location /files/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

