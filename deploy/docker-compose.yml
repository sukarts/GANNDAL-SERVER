# Dev: dépendances (PostgreSQL + MinIO).
# En production, voir docker-compose.prod.yml + docs/DEPLOYMENT.md
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ganndal
      POSTGRES_PASSWORD: ganndal
      POSTGRES_DB: ganndal
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data

  # Crée le bucket "ganndal" au démarrage
  createbucket:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 minioadmin minioadmin) do sleep 2; done;
      /usr/bin/mc mb -p local/ganndal;
      /usr/bin/mc anonymous set download local/ganndal;
      exit 0;
      "

volumes:
  pgdata:
  miniodata:
