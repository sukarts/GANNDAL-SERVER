# Production VPS unique — backend + frontend + postgres + minio derrière Nginx.
# Tout self-hosted. Renseigner les secrets dans deploy/.env (voir .env.prod.example).
services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [ganndal]

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks: [ganndal]

  # Crée le bucket "ganndal" (lecture publique) au démarrage
  createbucket:
    image: minio/mc:latest
    depends_on: [minio]
    networks: [ganndal]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 ${S3_ACCESS_KEY} ${S3_SECRET_KEY}) do sleep 2; done;
      /usr/bin/mc mb -p local/${S3_BUCKET};
      /usr/bin/mc anonymous set download local/${S3_BUCKET};
      exit 0;
      "

  backend:
    build: ../backend
    restart: always
    env_file: .env
    depends_on: [postgres, minio]
    networks: [ganndal]
    # Applique le schéma (db push, pas de migrations) puis démarre
    command: sh -c "npx prisma db push --skip-generate && node dist/server.js"

  frontend:
    build:
      context: ../frontend
      args:
        # Next inline les NEXT_PUBLIC_* au BUILD. Même origine derrière nginx => /api
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-/api}
    restart: always
    depends_on: [backend]
    networks: [ganndal]

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [backend, frontend]
    networks: [ganndal]

volumes:
  pgdata:
  miniodata:

networks:
  ganndal:
