# Production — backend + frontend + postgres + minio derrière Nginx.
# Renseigner les secrets via un fichier .env à côté de ce compose.
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [ganndal]

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    networks: [ganndal]

  backend:
    build: ../backend
    restart: always
    env_file: .env
    depends_on: [postgres, minio]
    networks: [ganndal]
    # migrate + start
    command: sh -c "npx prisma migrate deploy && node dist/server.js"

  frontend:
    build: ../frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    depends_on: [backend]
    networks: [ganndal]

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on: [backend, frontend]
    networks: [ganndal]

volumes:
  pgdata:
  miniodata:

networks:
  ganndal:
